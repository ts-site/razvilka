<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Развилка ULTIMATE</title>

<style>
html { scroll-behavior:smooth; }

body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:#e5e7eb;
}

header {
    padding:60px;
    text-align:center;
    background:#020617;
}

input {
    width:80%;
    padding:15px;
    border-radius:10px;
    border:none;
    margin-top:20px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:30px;
}

.card {
    background:#1f2937;
    border-radius:12px;
    padding:15px;
}

iframe {
    width:100%;
    height:200px;
    border:none;
    border-radius:10px;
}

h2 {color:#22c55e;padding-left:30px}

</style>

<script>
function search(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.getElementsByClassName("card");
for(let i=0;i<cards.length;i++){
let text=cards[i].innerText.toLowerCase();
cards[i].style.display=text.includes(input)?"block":"none";
}
}
</script>

</head>

<body>

<header>
<h1>Развилка — REAL ULTIMATE 💀</h1>
<input id="search" onkeyup="search()" placeholder="поиск...">
</header>

<h2>🍕 Кафе</h2>
<div class="grid">

<div class="card">
<h3>Додо Пицца</h3>
<iframe src="https://yandex.ru/map-widget/v1/?text=Додо Пицца Развилка"></iframe>
</div>

<div class="card">
<h3>Кофейни</h3>
<iframe src="https://yandex.ru/map-widget/v1/?text=кофейня Развилка"></iframe>
</div>

</div>

<h2>🛒 Магазины</h2>
<div class="grid">

<div class="card">
<h3>Пятёрочка</h3>
<iframe src="https://yandex.ru/map-widget/v1/?text=Пятерочка Развилка"></iframe>
</div>

<div class="card">
<h3>Магнит</h3>
<iframe src="https://yandex.ru/map-widget/v1/?text=Магнит Развилка"></iframe>
</div>

</div>

<h2>🏫 Образование</h2>
<div class="grid">

<div class="card">
<h3>Школа</h3>
<iframe src="https://yandex.ru/map-widget/v1/?text=школа Развилка"></iframe>
</div>

<div class="card">
<h3>Детский сад</h3>
<iframe src="https://yandex.ru/map-widget/v1/?text=детский сад Развилка"></iframe>
</div>

</div>

<h2>💪 Спорт</h2>
<div class="grid">

<div class="card">
<h3>Фитнес</h3>
<iframe src="https://yandex.ru/map-widget/v1/?text=фитнес Развилка"></iframe>
</div>

</div>

</body>
</html>
