<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Развилка PANORAMA FINAL FIX</title>

<style>
html { scroll-behavior:smooth; }

body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:#e5e7eb;
}

header {
    padding:60px;
    text-align:center;
    background:#020617;
}

nav {
    display:flex;
    gap:15px;
    padding:10px;
    background:#020617;
    overflow-x:auto;
    position:sticky;
    top:0;
}

nav a {
    color:white;
    text-decoration:none;
    flex-shrink:0;
}

section {
    padding:40px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card {
    background:#1f2937;
    border-radius:12px;
    padding:15px;
}

iframe {
    width:100%;
    height:220px;
    border:none;
    border-radius:10px;
}

input {
    width:80%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-top:15px;
}
</style>

<script>
function search(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.getElementsByClassName("card");
for(let i=0;i<cards.length;i++){
let text=cards[i].innerText.toLowerCase();
cards[i].style.display=text.includes(input)?"block":"none";
}
}
</script>

</head>

<body>

<header>
<h1>Развилка 💀 PANORAMA FINAL</h1>
<input id="search" onkeyup="search()" placeholder="поиск...">
</header>

<nav>
<a href="#cafe">Кафе</a>
<a href="#shops">Магазины</a>
<a href="#edu">Образование</a>
</nav>

<section id="cafe">
<h2>🍕 Кафе</h2>
<div class="grid">

<div class="card">
<h3>Додо Пицца</h3>
<iframe src="https://yandex.ru/map-widget/v1/?ll=37.7495%2C55.5900&l=stv%2Csta"></iframe>
</div>

<div class="card">
<h3>Шаурма</h3>
<iframe src="https://yandex.ru/map-widget/v1/?ll=37.7500%2C55.5903&l=stv%2Csta"></iframe>
</div>

</div>
</section>

<section id="shops">
<h2>🛒 Магазины</h2>
<div class="grid">

<div class="card">
<h3>Пятёрочка</h3>
<iframe src="https://yandex.ru/map-widget/v1/?ll=37.7488%2C55.5898&l=stv%2Csta"></iframe>
</div>

<div class="card">
<h3>Магнит</h3>
<iframe src="https://yandex.ru/map-widget/v1/?ll=37.7490%2C55.5905&l=stv%2Csta"></iframe>
</div>

</div>
</section>

<section id="edu">
<h2>🏫 Образование</h2>
<div class="grid">

<div class="card">
<h3>Школа</h3>
<iframe src="https://yandex.ru/map-widget/v1/?ll=37.7482%2C55.5902&l=stv%2Csta"></iframe>
</div>

<div class="card">
<h3>Детский сад</h3>
<iframe src="https://yandex.ru/map-widget/v1/?ll=37.7485%2C55.5895&l=stv%2Csta"></iframe>
</div>

</div>
</section>

</body>
</html>
